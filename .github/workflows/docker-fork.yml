name: Publish Docker image (fork)

# Builds the fork's main branch and pushes the resulting image to
# ${{ secrets.DOCKERHUB_USERNAME }}/new-api on Docker Hub.
#
# Triggers:
#   - push to main (skips doc-only changes)
#   - manual dispatch

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - ".gitignore"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/new-api

jobs:
  build:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Guard — DOCKERHUB_USERNAME must be set
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::DOCKERHUB_USERNAME secret is not set on this repository."
            exit 1
          fi

      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute version string
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="fork-$(date +'%Y%m%d')-${SHORT_SHA}"
          echo "$VERSION" > VERSION
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE_NAME} version ${VERSION} (${{ matrix.arch }})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:main-${{ steps.version.outputs.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=fork-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=fork-${{ matrix.arch }}
          provenance: false
          sbom: false

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute short sha
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (latest)
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:latest-amd64" \
            "${IMAGE_NAME}:latest-arm64"

      - name: Create & push manifest (main-<sha>)
        env:
          SHA: ${{ steps.version.outputs.sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:main-${SHA}" \
            "${IMAGE_NAME}:main-${SHA}-amd64" \
            "${IMAGE_NAME}:main-${SHA}-arm64"

      - name: Image summary
        env:
          SHA: ${{ steps.version.outputs.sha }}
        run: |
          {
            echo "### Published image"
            echo ""
            echo '```'
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:main-${SHA}"
            echo '```'
            echo ""
            echo "Pull with:"
            echo '```'
            echo "docker pull ${IMAGE_NAME}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
